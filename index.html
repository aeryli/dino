<p>
1. download assets.zip and add it to drive.
2. double-click the zip file or right click >> open (from drive, in files.)
3. close files (It still stays open)
4. click copy bookmark
5. paste the text into your bookmarks

<a href="https://aeryli.github.io/dino/assets.html/">assets.zip</a>
<a href="assets.html"></a>
<button id="getCopy">Copy bookmark</button>

<script>
  document.getElementById('getCopy').addEventListener('click', async () => {
    const fileUrl = 'https://aeryli.github.io/dino/bookmark.txt'; // Replace with your file URL

    try {
      // 1. Fetch the text from the hosted file
      const response = await fetch(fileUrl);
      if (!response.ok) throw new Error('File not found');
      
      const text = await response.text();

      // 2. Copy the fetched text to the clipboard
      await navigator.clipboard.writeText(text);
      
      alert('Text successfully copied to clipboard!');
    } catch (err) {
      console.error('Error fetching or copying text:', err);
      alert('Failed to copy text. Check console for details.');
    }
  });
</script>
